name: CI
run-name: CI - ${{ github.ref_name }} frontend (by @${{ github.actor }}) -- ${{ github.event.head_commit.message }}

# Lint/test/build gate a build-artifact upload. src/lib/api-types.ts is committed (generated from
# the backend's OpenAPI spec via `npm run gen:api`, requires a live backend on :3300) so a cold
# checkout builds fine without the backend running — CI never regenerates it. See
# claude_planning/20260713_1735_frontend_cicd/01_plan_log.md §3 (Option B) for the deploy-target
# decision: CD (.github/workflows/cd.yml) deploys an nginx-static container on the same staging
# box as the backend. This workflow builds+pushes that image to GHCR (SHA tag, never `latest`),
# mirroring the backend's CI-pushes/CD-deploys split, and CD only pulls+deploys — it never builds.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        # tsc -b && vite build — this is also the typecheck gate; there is no separate
        # `typecheck` script in package.json. Needs src/lib/api-types.ts, which is committed
        # (not generated here) — see 01_plan_log.md §1.
        run: npm run build

      - name: npm audit (fails the build — never auto-fixed here)
        # High/critical vulnerabilities fail CI outright. Do NOT change this to `audit fix
        # --force` in this workflow — that silently pulls in breaking major-version bumps.
        # A real finding here is a devops decision, not something CI auto-resolves.
        run: npm audit --audit-level=high

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  build-and-push:
    name: Build & push image to GHCR (SHA tag)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runtime image (nginx-static, secret-free)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          # Immutable commit-SHA tag only — never `latest`. CD deploys this exact tag, so a
          # redeploy is always reproducible and traceable to a commit.
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Runtime-secrets model (matches the backend): this image is built with NO Infisical
          # involvement at all — `VITE_API_URL`/`VITE_LIFF_ID` are literal placeholder sentinels
          # baked in by the Dockerfile's `build` stage (see its header comment). There is
          # deliberately no `secrets:` input and no `INFISICAL_*` build-arg here anymore — the
          # SAME image is portable across every environment; Infisical is resolved by
          # `docker-entrypoint.sh` at container START on the staging box (see cd.yml /
          # docker-compose.staging.yml), not here in CI.
