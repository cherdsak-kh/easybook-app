# Minimal SPA static server. Client-side routing means any unknown path must fall back to
# index.html rather than 404ing — the SPA's own router resolves the route in the browser.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
